<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Link Verification...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }
        .loading-box {
            text-align: center;
            background: #111625;
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 360px;
            width: 90%;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #6366f1;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            font-size: 22px;
            margin: 0 0 10px 0;
            font-weight: 600;
            color: #ffffff;
        }
        p {
            font-size: 14px;
            color: #9ca3af;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="loading-box">
    <div class="spinner"></div>
    <h2>Checking Secure Link...</h2>
    <p>Please wait, redirecting in <span id="countdown">2</span>s...</p>
</div>

<script>
    // ------ আপনার বিজ্ঞপ্তির ডিরেক্ট লিংকটি নিচে বসান ------
    const ADS_LINK = "https://www.effectivecpmnetwork.com/ytx0ia3zxe?key=2781168cf9b4cf2ce6d93aaa2b0c8db9"; 
    // ----------------------------------------------------

    let timeLeft = 2;
    const countdownElement = document.getElementById('countdown');

    const timer = setInterval(() => {
        timeLeft--;
        if (timeLeft >= 0) {
            countdownElement.textContent = timeLeft;
        }
        
        if (timeLeft <= 0) {
            clearInterval(timer);
            
            // রিফায়ারার হাইড করে নিরাপদ উপায়ে অটো-রিডাইরেক্ট করার জন্য অদৃশ্য এঙ্কর ট্যাগ
            const secureLink = document.createElement('a');
            secureLink.href = ADS_LINK;
            secureLink.rel = "noreferrer";
            document.body.appendChild(secureLink);
            
            // সরাসরি একই ট্যাবে বিজ্ঞাপনে নিয়ে যাবে
            window.location.replace(ADS_LINK);
        }
    }, 1000);
</script>

</body>
</html>
